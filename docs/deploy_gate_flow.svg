<path d="M1030,175 H1084" stroke="#b8a79e" stroke-width="1.6" fill="none" marker-end="url(#a)"/>
<path d="M1168,175 H1212" stroke="#b8a79e" stroke-width="1.6" fill="none" marker-end="url(#a)"/>
<text class="al" x="862" y="166" text-anchor="middle">Yes</text>
<text class="al" x="1190" y="166" text-anchor="middle">Yes</text>
