<text class="al" x="1142" y="300" text-anchor="middle">No</text>
<g><rect x="24" y="424" width="14" height="14" rx="7" fill="none" stroke="#d4a373" stroke-width="1.6"/><text class="lg" x="46" y="435">start/end</text><rect x="150" y="424" width="14" height="14" rx="3" fill="none" stroke="#e8825f" stroke-width="1.6"/><text class="lg" x="172" y="435">automated</text><rect x="280" y="424" width="14" height="14" rx="3" fill="none" stroke="#8da189" stroke-width="1.6"/><text class="lg" x="302" y="435">manual / review</text><polygon points="445,424 459,431 445,438 431,431" fill="none" stroke="#cb9a3e" stroke-width="1.6"/><text class="lg" x="466" y="435">decision</text><line x1="560" y1="431" x2="592" y2="431" stroke="#b8a79e" stroke-width="1.6" marker-end="url(#a)"/><text class="lg" x="598" y="435">Yes / pass</text><line x1="690" y1="431" x2="722" y2="431" stroke="#d95d39" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#a)"/><text class="lg" x="728" y="435">No / refuse</text></g>
