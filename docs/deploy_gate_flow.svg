<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 470" width="100%" role="img">
<title>MinusOps deploy gate — process flow</title>
<desc>verify, plan, approve, apply with decision gates and refusal paths; apply runs only the approved plan hash.</desc>
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#fbf7f4"/></marker><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="rgba(217,93,57,.06)" stroke-width="0.5"/></pattern><style>.t{font:600 18px Outfit,system-ui,sans-serif;fill:#fbf7f4}.pill{font:600 12px Outfit,system-ui,sans-serif;fill:#fbf7f4}.st{font:600 12px Outfit,system-ui,sans-serif;fill:#fbf7f4}.ss{font:500 9px 'JetBrains Mono',ui-monospace,monospace;fill:#b09c93}.bd{font:600 10px Inter,system-ui,sans-serif;fill:#fbf7f4}.dl{font:600 10px Outfit,system-ui,sans-serif;fill:#cb9a3e}.dsub{font:500 8px 'JetBrains Mono',ui-monospace,monospace;fill:#d4a373}.al{font:600 9px Inter,system-ui,sans-serif;fill:#b8a79e}.lg{font:500 11px Inter,system-ui,sans-serif;fill:#b09c93}</style></defs>
<rect width="1400" height="470" fill="#14110f"/><rect width="1400" height="470" fill="url(#g)"/>
<rect width="1400" height="54" fill="#1c1714"/><rect y="53" width="1400" height="1" fill="rgba(217,93,57,.18)"/>
<text class="t" x="24" y="33">Deploy Gate — process flow</text>
<g><rect x="24" y="143" width="124" height="64" rx="32" fill="#1c1714" stroke="#d4a373" stroke-width="1.7"/><text class="pill" x="86" y="182" text-anchor="middle">plan ready</text></g>
<g><rect x="178" y="140" width="148" height="70" rx="9" fill="#1c1714" stroke="#e8825f" stroke-width="1.6"/><circle cx="178" cy="140" r="12" fill="#14110f" stroke="#e8825f" stroke-width="1.5"/><text class="bd" x="178" y="144" text-anchor="middle">1</text><text class="st" x="196" y="171">verify</text><text class="ss" x="196" y="190">fmt·validate·scan</text></g>
<g><rect x="356" y="140" width="148" height="70" rx="9" fill="#1c1714" stroke="#e8825f" stroke-width="1.6"/><circle cx="356" cy="140" r="12" fill="#14110f" stroke="#e8825f" stroke-width="1.5"/><text class="bd" x="356" y="144" text-anchor="middle">2</text><text class="st" x="374" y="171">plan</text><text class="ss" x="374" y="190">record plan-hash</text></g>
<g><rect x="556" y="140" width="148" height="70" rx="9" fill="#1c1714" stroke="#8da189" stroke-width="1.6"/><circle cx="556" cy="140" r="12" fill="#14110f" stroke="#8da189" stroke-width="1.5"/><text class="bd" x="556" y="144" text-anchor="middle">3</text><text class="st" x="574" y="171">approve</text><text class="ss" x="574" y="190">RBAC · review</text></g>
<g><polygon points="800,133 842,175 800,217 758,175" fill="#1c1714" stroke="#cb9a3e" stroke-width="1.6"/><text class="dl" x="800" y="126" text-anchor="middle">approve gate</text><text class="dsub" x="800" y="232" text-anchor="middle">authorized·CURRENT·hash</text></g>
<g><rect x="882" y="140" width="148" height="70" rx="9" fill="#1c1714" stroke="#e8825f" stroke-width="1.6"/><circle cx="882" cy="140" r="12" fill="#14110f" stroke="#e8825f" stroke-width="1.5"/><text class="bd" x="882" y="144" text-anchor="middle">4</text><text class="st" x="900" y="171">apply</text><text class="ss" x="900" y="190">exact tfplan</text></g>
<g><polygon points="1126,133 1168,175 1126,217 1084,175" fill="#1c1714" stroke="#cb9a3e" stroke-width="1.6"/><text class="dl" x="1126" y="126" text-anchor="middle">apply gate</text><text class="dsub" x="1126" y="232" text-anchor="middle">hash==approved·MFA</text></g>
<g><rect x="1212" y="143" width="128" height="64" rx="32" fill="#1c1714" stroke="#d4a373" stroke-width="1.7"/><text class="pill" x="1276" y="182" text-anchor="middle">APPLIED</text></g>
<path d="M148,175 H178" stroke="#b8a79e" stroke-width="1.6" fill="none" marker-end="url(#a)"/>
<path d="M326,175 H356" stroke="#b8a79e" stroke-width="1.6" fill="none" marker-end="url(#a)"/>
