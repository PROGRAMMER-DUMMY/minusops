name: Floci Fidelity Gauntlet (scratch, temporary)

on:
  workflow_dispatch: {}

jobs:
  gauntlet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"
          terraform_wrapper: false

      - name: Start Floci
        run: |
          set -euxo pipefail
          docker run -d --name floci -p 4566:4566 ghcr.io/floci-io/floci:latest || \
            docker run -d --name floci -p 4566:4566 floci/floci:latest
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4566/_localstack/health >/dev/null 2>&1 || curl -sf http://localhost:4566/ >/dev/null 2>&1; then
              echo "floci responding after $i attempts"
              break
            fi
            sleep 1
          done
          docker logs floci 2>&1 | tail -40
          docker exec floci cat /etc/os-release 2>&1 || true

      - name: Common provider override fixture
        run: |
          mkdir -p /tmp/gauntlet
          cat > /tmp/gauntlet/provider.tf <<'EOF'
          terraform {
            required_providers { aws = { source = "hashicorp/aws", version = ">= 5.0" } }
          }
          provider "aws" {
            access_key = "test"
            secret_key = "test"
            region = "us-east-1"
            s3_use_path_style = true
            skip_credentials_validation = true
            skip_metadata_api_check = true
            skip_requesting_account_id = true
            endpoints {
              athena = "http://localhost:4566"
              budgets = "http://localhost:4566"
              cloudwatch = "http://localhost:4566"
              cloudwatchevents = "http://localhost:4566"
              cloudwatchlogs = "http://localhost:4566"
              ec2 = "http://localhost:4566"
              emrserverless = "http://localhost:4566"
              glue = "http://localhost:4566"
              iam = "http://localhost:4566"
              kinesis = "http://localhost:4566"
              firehose = "http://localhost:4566"
              kinesisanalyticsv2 = "http://localhost:4566"
              kms = "http://localhost:4566"
              mwaa = "http://localhost:4566"
              redshiftserverless = "http://localhost:4566"
              s3 = "http://localhost:4566"
              sfn = "http://localhost:4566"
              sns = "http://localhost:4566"
              sts = "http://localhost:4566"
            }
          }
          EOF

      # ---------------------------------------------------------------
      # Re-test issue #871: aws_instance crashed the provider plugin (nil pointer, read-after-
      # create). This repo's own modules don't use aws_instance, but it's the documented bug
      # to re-verify on the current version, per the brief.
      # ---------------------------------------------------------------
      - name: "RE-TEST #871: aws_instance apply (previously crashed provider plugin)"
        working-directory: /tmp/gauntlet
        run: |
          set -uxo pipefail
          rm -rf issue871 && mkdir issue871 && cd issue871
          cp ../provider.tf .
          cat > main.tf <<'EOF'
          resource "aws_instance" "probe" {
            ami           = "ami-00000000000000000"
            instance_type = "t3.micro"
          }
          EOF
          terraform init -input=false
          if terraform apply -auto-approve; then RESULT=0; else RESULT=$?; fi
          echo "ISSUE_871_RETEST_EXIT=$RESULT" >> "$GITHUB_STEP_SUMMARY"
          if [ "$RESULT" -ne 0 ]; then
            echo "::warning::aws_instance apply failed on current Floci -- check output above for the SAME nil-pointer/plugin-crash signature as #871, or a different (possibly more benign) error"
          else
            echo "aws_instance applied cleanly -- #871 appears fixed on current Floci version"
          fi

      # ---------------------------------------------------------------
      # Re-test issue #177: aws_cognito_user_pool crashed the provider plugin, though the SAME
      # config worked against real AWS per the reporter.
      # ---------------------------------------------------------------
      - name: "RE-TEST #177: aws_cognito_user_pool apply (previously crashed provider plugin)"
        working-directory: /tmp/gauntlet
        run: |
          set -uxo pipefail
          rm -rf issue177 && mkdir issue177 && cd issue177
          cp ../provider.tf .
          cat > main.tf <<'EOF'
          resource "aws_cognito_user_pool" "probe" {
            name = "gauntlet-user-pool"
          }
          EOF
          terraform init -input=false
          if terraform apply -auto-approve; then RESULT=0; else RESULT=$?; fi
          echo "ISSUE_177_RETEST_EXIT=$RESULT" >> "$GITHUB_STEP_SUMMARY"
          if [ "$RESULT" -ne 0 ]; then
            echo "::warning::aws_cognito_user_pool apply failed on current Floci -- check for the same read-after-create nil-pointer crash as #177"
          else
            echo "aws_cognito_user_pool applied cleanly -- #177 appears fixed on current Floci version"
          fi

      # ---------------------------------------------------------------
      # Re-test issue #28's S3-catch-all-route concern: does an unrelated service's endpoint
      # (SNS, a two-segment-path-shaped API) get correctly routed, or hijacked by Floci's own
      # S3 controller the way #28 described?
      # ---------------------------------------------------------------
      - name: "RE-TEST #28: SNS topic create (S3 catch-all route historically hijacked non-S3 two-segment paths)"
        working-directory: /tmp/gauntlet
        run: |
          set -uxo pipefail
          rm -rf issue28_sns && mkdir issue28_sns && cd issue28_sns
          cp ../provider.tf .
          cat > main.tf <<'EOF'
          resource "aws_sns_topic" "probe" {
            name = "gauntlet-topic"
          }
          EOF
          terraform init -input=false
          if terraform apply -auto-approve; then RESULT=0; else RESULT=$?; fi
          echo "ISSUE_28_SNS_RETEST_EXIT=$RESULT" >> "$GITHUB_STEP_SUMMARY"

      # ---------------------------------------------------------------
      # SECURITY-CRITICAL, MANDATORY both-direction negative fidelity (same fixtures as
      # MiniStack's gauntlet, for direct comparison in the matrix)
      # ---------------------------------------------------------------

      - name: "[IAM] POSITIVE: valid role + scoped policy applies cleanly"
        working-directory: /tmp/gauntlet
        run: |
          set -euxo pipefail
          rm -rf iam_positive && mkdir iam_positive && cd iam_positive
          cp ../provider.tf .
          cat > main.tf <<'EOF'
          data "aws_iam_policy_document" "assume" {
            statement {
              actions = ["sts:AssumeRole"]
              principals {
              type        = "Service"
              identifiers = ["glue.amazonaws.com"]
            }
            }
          }
          resource "aws_iam_role" "r" {
            name = "gauntlet-role"
            assume_role_policy = data.aws_iam_policy_document.assume.json
          }
          resource "aws_iam_role_policy" "p" {
            name = "gauntlet-policy"
            role = aws_iam_role.r.id
            policy = jsonencode({
              Version = "2012-10-17"
              Statement = [{ Effect = "Allow", Action = ["s3:GetObject"], Resource = "arn:aws:s3:::specific-bucket/*" }]
            })
          }
          EOF
          terraform init -input=false
          terraform apply -auto-approve
          echo "IAM_POSITIVE_RESULT=PASS" >> "$GITHUB_STEP_SUMMARY"

      - name: "[IAM] NEGATIVE: malformed principal ARN in trust policy -- must be REJECTED"
        working-directory: /tmp/gauntlet
        run: |
          set -uxo pipefail
          rm -rf iam_negative && mkdir iam_negative && cd iam_negative
          cp ../provider.tf .
          cat > main.tf <<'EOF'
          resource "aws_iam_role" "bad" {
            name = "gauntlet-bad-role"
            assume_role_policy = jsonencode({
              Version = "2012-10-17"
              Statement = [{
                Effect = "Allow"
                Principal = { AWS = "arn:aws:iam::12:root" }
                Action = "sts:AssumeRole"
              }]
            })
          }
          EOF
          terraform init -input=false
          if terraform apply -auto-approve; then RESULT=0; else RESULT=$?; fi
          echo "IAM_NEGATIVE_APPLY_EXIT=$RESULT" >> "$GITHUB_STEP_SUMMARY"
          if [ "$RESULT" -eq 0 ]; then
            echo "::error::Floci ACCEPTED a malformed IAM principal ARN that real AWS rejects -- negative fidelity FAILED for aws_iam_role"
          else
            echo "Floci correctly rejected the malformed principal ARN (negative fidelity OK)"
          fi

      - name: "[KMS] POSITIVE: valid key policy applies cleanly"
        working-directory: /tmp/gauntlet
        run: |
          set -euxo pipefail
          rm -rf kms_positive && mkdir kms_positive && cd kms_positive
          cp ../provider.tf .
          cat > main.tf <<'EOF'
          resource "aws_kms_key" "k" {
            description = "gauntlet key"
            policy = jsonencode({
              Version = "2012-10-17"
              Statement = [{
                Sid = "EnableRoot", Effect = "Allow"
                Principal = { AWS = "arn:aws:iam::000000000000:root" }
                Action = "kms:*", Resource = "*"
              }]
            })
          }
          EOF
          terraform init -input=false
          terraform apply -auto-approve
          echo "KMS_POSITIVE_RESULT=PASS" >> "$GITHUB_STEP_SUMMARY"

      - name: "[KMS] NEGATIVE: key policy missing a root/admin statement -- real AWS rejects this"
        working-directory: /tmp/gauntlet
        run: |
          set -uxo pipefail
          rm -rf kms_negative && mkdir kms_negative && cd kms_negative
          cp ../provider.tf .
          cat > main.tf <<'EOF'
          resource "aws_kms_key" "bad" {
            description = "gauntlet bad key"
            policy = jsonencode({
              Version = "2012-10-17"
              Statement = [{
                Sid = "OnlyOneUnrelatedUser", Effect = "Allow"
                Principal = { AWS = "arn:aws:iam::000000000000:user/someone" }
                Action = "kms:Decrypt", Resource = "*"
              }]
            })
          }
          EOF
          terraform init -input=false
          if terraform apply -auto-approve; then RESULT=0; else RESULT=$?; fi
          echo "KMS_NEGATIVE_APPLY_EXIT=$RESULT" >> "$GITHUB_STEP_SUMMARY"
          if [ "$RESULT" -eq 0 ]; then
            echo "::error::Floci ACCEPTED a KMS key policy missing a root/admin statement, which real AWS rejects -- negative fidelity FAILED for aws_kms_key"
          else
            echo "Floci correctly rejected the key policy missing a root statement (negative fidelity OK)"
          fi

      - name: "[S3] POSITIVE: valid bucket policy applies cleanly"
        working-directory: /tmp/gauntlet
        run: |
          set -euxo pipefail
          rm -rf s3_positive && mkdir s3_positive && cd s3_positive
          cp ../provider.tf .
          cat > main.tf <<'EOF'
          resource "aws_s3_bucket" "b" { bucket = "gauntlet-positive-bucket" }
          resource "aws_s3_bucket_policy" "p" {
            bucket = aws_s3_bucket.b.id
            policy = jsonencode({
              Version = "2012-10-17"
              Statement = [{
                Effect = "Allow", Principal = { AWS = "arn:aws:iam::000000000000:root" }
                Action = "s3:GetObject", Resource = "${aws_s3_bucket.b.arn}/*"
              }]
            })
          }
          EOF
          terraform init -input=false
          terraform apply -auto-approve
          echo "S3_POSITIVE_RESULT=PASS" >> "$GITHUB_STEP_SUMMARY"

      - name: "[S3] NEGATIVE: bucket policy referencing a non-existent/malformed resource ARN -- real AWS rejects this"
        working-directory: /tmp/gauntlet
        run: |
          set -uxo pipefail
          rm -rf s3_negative && mkdir s3_negative && cd s3_negative
          cp ../provider.tf .
          cat > main.tf <<'EOF'
          resource "aws_s3_bucket" "b" { bucket = "gauntlet-negative-bucket" }
          resource "aws_s3_bucket_policy" "p" {
            bucket = aws_s3_bucket.b.id
            policy = jsonencode({
              Version = "2012-10-17"
              Statement = [{
                Effect = "Allow", Principal = { AWS = "arn:aws:iam::000000000000:root" }
                Action = "s3:GetObject", Resource = "arn:aws:s3:::completely-different-bucket-name/*"
              }]
            })
          }
          EOF
          terraform init -input=false
          if terraform apply -auto-approve; then RESULT=0; else RESULT=$?; fi
          echo "S3_NEGATIVE_APPLY_EXIT=$RESULT" >> "$GITHUB_STEP_SUMMARY"
          if [ "$RESULT" -eq 0 ]; then
            echo "::error::Floci ACCEPTED a bucket policy referencing a different bucket's ARN, which real AWS rejects -- negative fidelity FAILED for aws_s3_bucket_policy"
          else
            echo "Floci correctly rejected the mismatched-resource bucket policy (negative fidelity OK)"
          fi

      - name: Docker logs on failure
        if: always()
        run: docker logs floci 2>&1 | tail -150
