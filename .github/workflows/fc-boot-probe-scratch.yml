name: Firecracker Boot Probe (scratch, temporary)

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: KVM check
        run: |
          set -euxo pipefail
          ls -la /dev/kvm
          sudo setfacl -m u:$(whoami):rw /dev/kvm || sudo chmod 666 /dev/kvm

      - name: Download firecracker binary
        run: |
          set -euxo pipefail
          ARCH="$(uname -m)"
          release_url="https://github.com/firecracker-microvm/firecracker/releases"
          latest=$(basename $(curl -fsSLI -o /dev/null -w %{url_effective} ${release_url}/latest))
          echo "latest=$latest"
          curl -L ${release_url}/download/${latest}/firecracker-${latest}-${ARCH}.tgz | tar -xz
          find . -maxdepth 2 -iname "firecracker*"
          FC_BIN=$(find . -maxdepth 2 -type f -iname "firecracker-*" | grep -v debug | head -1)
          echo "FC_BIN=$FC_BIN" >> "$GITHUB_ENV"
          chmod +x "$FC_BIN"
          "$FC_BIN" --version

      - name: Download kernel + rootfs (official quickstart CI artifacts -- exact keys confirmed live)
        run: |
          set -euxo pipefail
          release_url="https://s3.amazonaws.com/spec.ccfc.min"
          curl -fsSL "${release_url}/firecracker-ci/v1.10/x86_64/vmlinux-6.1.102" -o vmlinux.bin
          curl -fsSL "${release_url}/firecracker-ci/v1.10/x86_64/ubuntu-22.04.ext4" -o rootfs.ext4
          curl -fsSL "${release_url}/firecracker-ci/v1.10/x86_64/ubuntu-22.04.id_rsa" -o id_rsa
          chmod 600 id_rsa
          ls -la vmlinux.bin rootfs.ext4 id_rsa
          file vmlinux.bin rootfs.ext4

      - name: Boot the microVM and configure via API socket
        run: |
          set -euxo pipefail
          API_SOCKET="/tmp/firecracker.socket"
          rm -f "$API_SOCKET"
          sudo "${FC_BIN}" --api-sock "$API_SOCKET" &
          sleep 1
          ls -la "$API_SOCKET"

          sudo ip tuntap add dev tap0 mode tap || true
          sudo ip addr add 172.16.0.1/30 dev tap0 || true
          sudo ip link set dev tap0 up
          sudo sh -c "echo 1 > /proc/sys/net/ipv4/ip_forward"
          HOST_IFACE=$(ip route | grep default | awk '{print $5}' | head -1)
          sudo iptables -t nat -A POSTROUTING -o "$HOST_IFACE" -j MASQUERADE || true
          sudo iptables -A FORWARD -i tap0 -o "$HOST_IFACE" -j ACCEPT || true
          sudo iptables -A FORWARD -i "$HOST_IFACE" -o tap0 -m state --state RELATED,ESTABLISHED -j ACCEPT || true

          sudo curl -sf -X PUT --unix-socket "$API_SOCKET" \
            --data '{"kernel_image_path":"'"$(pwd)"'/vmlinux.bin","boot_args":"console=ttyS0 reboot=k panic=1 pci=off ip=172.16.0.2::172.16.0.1:255.255.255.252::eth0:off"}' \
            "http://localhost/boot-source"

          sudo curl -sf -X PUT --unix-socket "$API_SOCKET" \
            --data '{"drive_id":"rootfs","path_on_host":"'"$(pwd)"'/rootfs.ext4","is_root_device":true,"is_read_only":false}' \
            "http://localhost/drives/rootfs"

          sudo curl -sf -X PUT --unix-socket "$API_SOCKET" \
            --data '{"iface_id":"net1","guest_mac":"06:00:AC:10:00:02","host_dev_name":"tap0"}' \
            "http://localhost/network-interfaces/net1"

          sudo curl -sf -X PUT --unix-socket "$API_SOCKET" \
            --data '{"action_type":"InstanceStart"}' \
            "http://localhost/actions"

          echo "VM start requested, waiting for boot..."
          sleep 5

      - name: SSH into the guest and prove it's really a separate machine
        run: |
          set -euxo pipefail
          for i in $(seq 1 20); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=2 -o BatchMode=yes -i id_rsa root@172.16.0.2 "echo GUEST_ALIVE" 2>/dev/null; then
              break
            fi
            echo "waiting for guest ssh... ($i)"
            sleep 2
          done
          echo "=== guest hostname/kernel (should differ from host) ==="
          ssh -o StrictHostKeyChecking=no -i id_rsa root@172.16.0.2 "hostname; uname -a; cat /etc/os-release | head -2"
          echo "=== host hostname/kernel for comparison ==="
          hostname; uname -a

      - name: Report findings
        if: always()
        run: |
          echo "See job output above for boot + SSH results"
