name: Trivy Shape Probe (scratch, temporary)

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install trivy
        run: |
          set -euxo pipefail
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy --version
      - name: Scan a real module, capture JSON shape
        run: |
          set -euxo pipefail
          trivy config -f json modules/storage-medallion-s3 > /tmp/trivy_out.json || true
          cat /tmp/trivy_out.json | python3 -m json.tool | head -80
          echo "--- top level keys ---"
          python3 -c "import json; d=json.load(open('/tmp/trivy_out.json')); print(list(d.keys()))"
          echo "--- Results[0] keys ---"
          python3 -c "import json; d=json.load(open('/tmp/trivy_out.json')); print(list(d['Results'][0].keys()) if d.get('Results') else 'NO RESULTS')"
          echo "--- Misconfigurations[0] if present ---"
          python3 -c "
          import json
          d = json.load(open('/tmp/trivy_out.json'))
          for r in d.get('Results', []):
              mc = r.get('Misconfigurations') or []
              if mc:
                  print(json.dumps(mc[0], indent=2))
                  break
          else:
              print('no misconfigurations found in any result')
          "
