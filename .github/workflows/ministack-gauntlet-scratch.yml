name: MiniStack Fidelity Gauntlet (scratch, temporary)

on:
  workflow_dispatch: {}

jobs:
  gauntlet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"
          terraform_wrapper: false

      - name: Start MiniStack
        run: |
          set -euxo pipefail
          docker run -d --name ministack -p 4566:4566 ministackorg/ministack
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4566/_localstack/health >/dev/null 2>&1 || curl -sf http://localhost:4566/ >/dev/null 2>&1; then
              echo "ministack responding after $i attempts"
              break
            fi
            sleep 1
          done
          docker logs ministack 2>&1 | tail -30

      - name: Common provider override fixture
        run: |
          mkdir -p /tmp/gauntlet
          cat > /tmp/gauntlet/provider.tf <<'EOF'
          terraform {
            required_providers { aws = { source = "hashicorp/aws", version = ">= 5.0" } }
          }
          provider "aws" {
            access_key = "test"
            secret_key = "test"
            region = "us-east-1"
            s3_use_path_style = true
            skip_credentials_validation = true
            skip_metadata_api_check = true
            skip_requesting_account_id = true
            endpoints {
              athena = "http://localhost:4566"
              budgets = "http://localhost:4566"
              cloudwatch = "http://localhost:4566"
              cloudwatchevents = "http://localhost:4566"
              cloudwatchlogs = "http://localhost:4566"
              ec2 = "http://localhost:4566"
              emrserverless = "http://localhost:4566"
              glue = "http://localhost:4566"
              iam = "http://localhost:4566"
              kinesis = "http://localhost:4566"
              firehose = "http://localhost:4566"
              kinesisanalyticsv2 = "http://localhost:4566"
              kms = "http://localhost:4566"
              mwaa = "http://localhost:4566"
              redshiftserverless = "http://localhost:4566"
              s3 = "http://localhost:4566"
              sfn = "http://localhost:4566"
              sns = "http://localhost:4566"
              sts = "http://localhost:4566"
            }
          }
          EOF

      # ---------------------------------------------------------------
      # SECURITY-CRITICAL, MANDATORY both-direction negative fidelity
      # ---------------------------------------------------------------

      - name: "[IAM] POSITIVE: valid role + scoped policy applies cleanly"
        working-directory: /tmp/gauntlet
        run: |
          set -euxo pipefail
          rm -rf iam_positive && mkdir iam_positive && cd iam_positive
          cp ../provider.tf .
          cat > main.tf <<'EOF'
          data "aws_iam_policy_document" "assume" {
            statement {
              actions = ["sts:AssumeRole"]
              principals { type = "Service", identifiers = ["glue.amazonaws.com"] }
            }
          }
          resource "aws_iam_role" "r" {
            name = "gauntlet-role"
            assume_role_policy = data.aws_iam_policy_document.assume.json
          }
          resource "aws_iam_role_policy" "p" {
            name = "gauntlet-policy"
            role = aws_iam_role.r.id
            policy = jsonencode({
              Version = "2012-10-17"
              Statement = [{ Effect = "Allow", Action = ["s3:GetObject"], Resource = "arn:aws:s3:::specific-bucket/*" }]
            })
          }
          EOF
          terraform init -input=false
          terraform apply -auto-approve
          echo "IAM_POSITIVE_RESULT=PASS" >> "$GITHUB_STEP_SUMMARY"

      - name: "[IAM] NEGATIVE: malformed principal ARN in trust policy -- must be REJECTED"
        working-directory: /tmp/gauntlet
        run: |
          set -uxo pipefail
          rm -rf iam_negative && mkdir iam_negative && cd iam_negative
          cp ../provider.tf .
          # A real AWS-rejected shape: a Principal ARN with an invalid/malformed account-id
          # segment (too few digits, not a real 12-digit account). Real AWS rejects this at
          # CreateRole time with MalformedPolicyDocumentException.
          cat > main.tf <<'EOF'
          resource "aws_iam_role" "bad" {
            name = "gauntlet-bad-role"
            assume_role_policy = jsonencode({
              Version = "2012-10-17"
              Statement = [{
                Effect = "Allow"
                Principal = { AWS = "arn:aws:iam::12:root" }
                Action = "sts:AssumeRole"
              }]
            })
          }
          EOF
          terraform init -input=false
          terraform apply -auto-approve
          RESULT=$?
          echo "IAM_NEGATIVE_APPLY_EXIT=$RESULT" >> "$GITHUB_STEP_SUMMARY"
          if [ "$RESULT" -eq 0 ]; then
            echo "::error::MiniStack ACCEPTED a malformed IAM principal ARN that real AWS rejects -- negative fidelity FAILED for aws_iam_role"
          else
            echo "MiniStack correctly rejected the malformed principal ARN (negative fidelity OK)"
          fi

      - name: "[KMS] POSITIVE: valid key policy applies cleanly"
        working-directory: /tmp/gauntlet
        run: |
          set -euxo pipefail
          rm -rf kms_positive && mkdir kms_positive && cd kms_positive
          cp ../provider.tf .
          cat > main.tf <<'EOF'
          data "aws_caller_identity" "current" {}
          resource "aws_kms_key" "k" {
            description = "gauntlet key"
            policy = jsonencode({
              Version = "2012-10-17"
              Statement = [{
                Sid = "EnableRoot", Effect = "Allow"
                Principal = { AWS = "arn:aws:iam::000000000000:root" }
                Action = "kms:*", Resource = "*"
              }]
            })
          }
          EOF
          terraform init -input=false
          terraform apply -auto-approve
          echo "KMS_POSITIVE_RESULT=PASS" >> "$GITHUB_STEP_SUMMARY"

      - name: "[KMS] NEGATIVE: key policy missing a root/admin statement -- real AWS rejects this"
        working-directory: /tmp/gauntlet
        run: |
          set -uxo pipefail
          rm -rf kms_negative && mkdir kms_negative && cd kms_negative
          cp ../provider.tf .
          # Real AWS rejects a KMS key policy with NO statement granting kms:* to the account
          # root / any admin principal at all -- MalformedPolicyDocumentException
          # ("The new key policy will not allow you to update the key policy in the future").
          cat > main.tf <<'EOF'
          resource "aws_kms_key" "bad" {
            description = "gauntlet bad key"
            policy = jsonencode({
              Version = "2012-10-17"
              Statement = [{
                Sid = "OnlyOneUnrelatedUser", Effect = "Allow"
                Principal = { AWS = "arn:aws:iam::000000000000:user/someone" }
                Action = "kms:Decrypt", Resource = "*"
              }]
            })
          }
          EOF
          terraform init -input=false
          terraform apply -auto-approve
          RESULT=$?
          echo "KMS_NEGATIVE_APPLY_EXIT=$RESULT" >> "$GITHUB_STEP_SUMMARY"
          if [ "$RESULT" -eq 0 ]; then
            echo "::error::MiniStack ACCEPTED a KMS key policy missing a root/admin statement, which real AWS rejects -- negative fidelity FAILED for aws_kms_key"
          else
            echo "MiniStack correctly rejected the key policy missing a root statement (negative fidelity OK)"
          fi

      - name: "[S3] POSITIVE: valid bucket policy applies cleanly"
        working-directory: /tmp/gauntlet
        run: |
          set -euxo pipefail
          rm -rf s3_positive && mkdir s3_positive && cd s3_positive
          cp ../provider.tf .
          cat > main.tf <<'EOF'
          resource "aws_s3_bucket" "b" { bucket = "gauntlet-positive-bucket" }
          resource "aws_s3_bucket_policy" "p" {
            bucket = aws_s3_bucket.b.id
            policy = jsonencode({
              Version = "2012-10-17"
              Statement = [{
                Effect = "Allow", Principal = { AWS = "arn:aws:iam::000000000000:root" }
                Action = "s3:GetObject", Resource = "${aws_s3_bucket.b.arn}/*"
              }]
            })
          }
          EOF
          terraform init -input=false
          terraform apply -auto-approve
          echo "S3_POSITIVE_RESULT=PASS" >> "$GITHUB_STEP_SUMMARY"

      - name: "[S3] NEGATIVE: bucket policy referencing a non-existent/malformed resource ARN -- real AWS rejects this"
        working-directory: /tmp/gauntlet
        run: |
          set -uxo pipefail
          rm -rf s3_negative && mkdir s3_negative && cd s3_negative
          cp ../provider.tf .
          # Real AWS rejects a bucket policy whose Resource ARN references a DIFFERENT bucket
          # name than the one the policy is attached to -- MalformedPolicyDocumentException
          # ("Policy has invalid resource").
          cat > main.tf <<'EOF'
          resource "aws_s3_bucket" "b" { bucket = "gauntlet-negative-bucket" }
          resource "aws_s3_bucket_policy" "p" {
            bucket = aws_s3_bucket.b.id
            policy = jsonencode({
              Version = "2012-10-17"
              Statement = [{
                Effect = "Allow", Principal = { AWS = "arn:aws:iam::000000000000:root" }
                Action = "s3:GetObject", Resource = "arn:aws:s3:::completely-different-bucket-name/*"
              }]
            })
          }
          EOF
          terraform init -input=false
          terraform apply -auto-approve
          RESULT=$?
          echo "S3_NEGATIVE_APPLY_EXIT=$RESULT" >> "$GITHUB_STEP_SUMMARY"
          if [ "$RESULT" -eq 0 ]; then
            echo "::error::MiniStack ACCEPTED a bucket policy referencing a different bucket's ARN, which real AWS rejects -- negative fidelity FAILED for aws_s3_bucket_policy"
          else
            echo "MiniStack correctly rejected the mismatched-resource bucket policy (negative fidelity OK)"
          fi

      # ---------------------------------------------------------------
      # STS AssumeRole ARN-shape re-test (issue #980 -- confirm the fix holds on current version)
      # ---------------------------------------------------------------

      - name: "[STS] re-test issue #980: malformed AssumeRole ARN must be rejected, not issue credentials"
        run: |
          set -uxo pipefail
          pip install awscli -q
          export AWS_ACCESS_KEY_ID=test
          export AWS_SECRET_ACCESS_KEY=test
          export AWS_DEFAULT_REGION=us-east-1
          # A malformed role ARN: wrong service segment ("s3" instead of "iam"), which real AWS
          # STS rejects outright before ever considering credentials.
          aws --endpoint-url=http://localhost:4566 sts assume-role \
            --role-arn "arn:aws:s3::000000000000:role/not-a-real-iam-arn" \
            --role-session-name gauntlet-negative-test
          RESULT=$?
          echo "STS_980_RETEST_EXIT=$RESULT" >> "$GITHUB_STEP_SUMMARY"
          if [ "$RESULT" -eq 0 ]; then
            echo "::error::MiniStack issued credentials for a malformed (wrong-service) role ARN -- issue #980's fix does NOT hold, or does not cover this shape"
          else
            echo "MiniStack correctly rejected the malformed role ARN -- #980's fix appears to hold"
          fi

      - name: "[STS] positive control: a well-formed role ARN is accepted"
        run: |
          set -euxo pipefail
          export AWS_ACCESS_KEY_ID=test
          export AWS_SECRET_ACCESS_KEY=test
          export AWS_DEFAULT_REGION=us-east-1
          aws --endpoint-url=http://localhost:4566 iam create-role \
            --role-name gauntlet-sts-role \
            --assume-role-policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"AWS":"arn:aws:iam::000000000000:root"},"Action":"sts:AssumeRole"}]}'
          aws --endpoint-url=http://localhost:4566 sts assume-role \
            --role-arn "arn:aws:iam::000000000000:role/gauntlet-sts-role" \
            --role-session-name gauntlet-positive-test
          echo "STS_POSITIVE_RESULT=PASS" >> "$GITHUB_STEP_SUMMARY"

      - name: Docker logs on failure
        if: always()
        run: docker logs ministack 2>&1 | tail -100
