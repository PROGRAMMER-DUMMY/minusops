name: "Terraform CI/CD"

# Validate on every PR/push; deploy only from main, behind a human approval gate.
# No long-lived AWS keys — authentication is OIDC (federated, short-lived).
on:
  pull_request:
    paths:
      - "templates/aws/medallion-pipeline/**"
  push:
    branches: [main]
    paths:
      - "templates/aws/medallion-pipeline/**"

permissions:
  contents: read
  id-token: write # required for AWS OIDC federation

env:
  TF_DIR: templates/aws/medallion-pipeline
  AWS_REGION: us-east-1
  TF_VERSION: "1.10.5"

jobs:
  # ---------------------------------------------------------------------------
  # Always runs (PR + push). No cloud credentials — pure static checks.
  # ---------------------------------------------------------------------------
  validate:
    name: "Validate & Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Format check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check

      - name: Init (providers only, no backend)
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend=false -input=false

      - name: Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate -no-color

      - name: Security scan (project scanner — same rules as plan_gate)
        run: python3 core/optimize_analyzer.py --source-dir ${{ env.TF_DIR }}

  # ---------------------------------------------------------------------------
  # Deploy only from main, AFTER validate, AND after manual approval.
  # `environment: production` is the human gate: configure required reviewers on
  # that environment in repo Settings → Environments. Auth is OIDC (no secrets).
  # ---------------------------------------------------------------------------
  deploy:
    name: "Plan & Apply (gated)"
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # OIDC: assumes the MFA-/condition-gated deploy role; no static access keys.
      # Set repo variable AWS_DEPLOY_ROLE_ARN (the MinusDeploy role from bootstrap/aws).
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Remote state via partial backend config (repo var TFSTATE_BUCKET).
      - name: Init (remote state)
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TFSTATE_BUCKET }}" \
            -backend-config="key=medallion-pipeline/prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Plan
        run: terraform plan -out=tfplan

      - name: Apply (approved plan only)
        run: terraform apply tfplan
