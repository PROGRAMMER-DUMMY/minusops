name: Ephemeral Apply (G9)

# G9 (docs/phase5_scope.md, Phase 5): ephemeral create+destroy against LocalStack, catching
# apply-time-only failures static analysis (G1/G2/G6) cannot. Structurally Ubuntu-only --
# confirmed directly against GitHub's own docs: service containers/Docker are only supported on
# Linux GitHub-hosted runners, never macOS or Windows -- matching this repo's existing
# docker-build-smoke job's own placement.
#
# Requires a PAID LocalStack account (LOCALSTACK_AUTH_TOKEN repo secret) -- see docs/
# phase5_scope.md's item 0. If that secret is not configured, this job skips loudly rather than
# silently passing: "the secret is absent" and "G9 ran and found nothing wrong" must never look
# the same in the Actions log.
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch: {}

jobs:
  ephemeral-apply:
    name: "G9 ephemeral apply (LocalStack)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"
          terraform_wrapper: false

      - name: Check LOCALSTACK_AUTH_TOKEN is configured
        id: token_check
        run: |
          if [ -z "${{ secrets.LOCALSTACK_AUTH_TOKEN }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: G9 not configured -- skipped loudly, not silently passed
        if: steps.token_check.outputs.configured != 'true'
        run: |
          echo "::warning::G9 (ephemeral apply) SKIPPED -- LOCALSTACK_AUTH_TOKEN is not configured. This is NOT the same as G9 passing; no ephemeral-apply verification ran on this commit. See docs/phase5_scope.md item 0."
          exit 0

      - name: Start LocalStack
        if: steps.token_check.outputs.configured == 'true'
        uses: LocalStack/setup-localstack@v0.2.2
        with:
          image-tag: "latest"
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}

      - name: Install package
        if: steps.token_check.outputs.configured == 'true'
        run: python -m pip install ".[dev]"

      # Proof-bar item 3 (docs/phase5_scope.md): a real assertion that G9 actually runs and
      # returns a genuine verdict -- not "the job didn't error." Uses a minimal, disposable
      # fixture and temporarily marks exactly the one type it exercises as verified for the
      # purpose of this smoke test -- the SHIPPED RESOURCE_TYPE_ALLOWLIST stays fully
      # unverified (see ephemeral_apply.py's own module docstring) until real per-type +
      # negative-fidelity verification actually happens against this same LocalStack instance
      # (proof-bar item 1, tracked separately, not yet done).
      - name: G9 smoke test -- real ephemeral apply against LocalStack
        if: steps.token_check.outputs.configured == 'true'
        run: |
          set -euo pipefail
          mkdir -p /tmp/g9_smoke
          cat > /tmp/g9_smoke/main.tf <<'EOF'
          terraform {
            required_providers { aws = { source = "hashicorp/aws", version = ">= 5.0" } }
          }
          resource "aws_s3_bucket" "smoke" {
            bucket = "g9-ci-smoke-bucket"
          }
          EOF
          python - <<'PY'
          import sys, json
          sys.path.insert(0, "core/governance")
          sys.path.insert(0, "core/reporting")
          import ephemeral_apply as ea
          # _entry()'s dict-of-dicts-per-emulator shape (docs/phase5_scope.md section 7) replaced
          # the old flat (verified, security_critical) tuple -- this line used to write a raw
          # tuple here, which unverified_types_in_plan()'s entry.get(emulator, {}) call would
          # have crashed on the moment this job next ran for real.
          ea.RESOURCE_TYPE_ALLOWLIST["aws_s3_bucket"] = ea._entry(False, localstack=(True, False))
          result = ea.run_ephemeral_apply("/tmp/g9_smoke", emulator="localstack",
                                           apply_timeout=120, destroy_timeout=120)
          print(json.dumps(result, indent=2))
          assert result["evaluation_failed"] is False, f"G9 smoke test did not apply cleanly: {result}"
          assert result["coverage"] == "full"
          assert result["emulator"] == "localstack"
          assert result["aws_resources_applied"] == ["aws_s3_bucket.smoke"]
          PY

      - name: Run ephemeral_apply.py's own test suite
        if: steps.token_check.outputs.configured == 'true'
        run: python -m pytest tests/test_ephemeral_apply.py -q

  isolation-boundary:
    name: "G9 isolation boundary (Firecracker + MiniStack, no token needed)"
    # docs/phase5_scope.md section 8: the naive design (terraform apply running directly on the
    # bare CI runner, an emulator container mounting the host's docker.sock as root) is a
    # container-escape / arbitrary-host-execution surface -- section 8.1's finding that a hostile
    # local-exec/remote-exec provisioner needs no emulator bug at all to reach the host is the
    # more fundamental vector. This job wires the REAL ephemeral_apply.py pipeline (not a bare
    # SSH-driven stand-in -- that was section 8.6's proof, this is the shipped mechanism) inside
    # the same real, proven Firecracker microVM boundary and re-runs the hostile-escape canary
    # against it. Uses MiniStack (free, no LOCALSTACK_AUTH_TOKEN needed) so this job runs on every
    # push, unconditionally -- proving the ISOLATION mechanism does not depend on which emulator a
    # user eventually configures. This is deliberately a SEPARATE, additional signal from the
    # `ephemeral-apply` job above: that job is about emulator FIDELITY (blocked on a paid
    # LocalStack token); this job is about the SANDBOX the apply step runs inside, which is
    # emulator-agnostic and must hold regardless of which emulator is selected.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: KVM check + permission
        run: |
          set -euxo pipefail
          ls -la /dev/kvm
          sudo setfacl -m u:$(whoami):rw /dev/kvm || sudo chmod 666 /dev/kvm

      - name: Download + checksum-verify the firecracker binary (pinned v1.16.1)
        run: |
          set -euxo pipefail
          # Every Firecracker artifact (binary, kernel, rootfs, id_rsa) lives in its OWN
          # directory outside the checked-out repo -- a real bug, found live, not guessed: the
          # "Copy the repo" step's `tar -C "$GITHUB_WORKSPACE" .` swept up these files (including
          # a 10GB scratch disk image) as if they were part of the repo, because they were
          # downloaded straight into $GITHUB_WORKSPACE with no isolation. That is what was
          # actually filling up the guest's disk every time, not genuine provisioning overhead --
          # each "grow the root" fix just made the accidentally-copied artifact bigger too.
          mkdir -p "$RUNNER_TEMP/fc"
          cd "$RUNNER_TEMP/fc"
          FC_VERSION="v1.16.1"
          ARCH="$(uname -m)"
          FC_TGZ="firecracker-${FC_VERSION}-${ARCH}.tgz"
          curl -fsSL "https://github.com/firecracker-microvm/firecracker/releases/download/${FC_VERSION}/${FC_TGZ}" -o "${FC_TGZ}"
          curl -fsSL "https://github.com/firecracker-microvm/firecracker/releases/download/${FC_VERSION}/${FC_TGZ}.sha256.txt" -o "${FC_TGZ}.sha256.txt"
          sha256sum -c "${FC_TGZ}.sha256.txt"
          tar -xzf "${FC_TGZ}"
          FC_BIN=$(find . -maxdepth 2 -type f -iname "firecracker-*" | grep -v debug | head -1)
          echo "FC_BIN=$(pwd)/${FC_BIN#./}" >> "$GITHUB_ENV"
          chmod +x "$FC_BIN"
          "$FC_BIN" --version

      - name: Download kernel + rootfs (official Firecracker quickstart CI artifacts, pinned keys)
        run: |
          set -euxo pipefail
          cd "$RUNNER_TEMP/fc"
          release_url="https://s3.amazonaws.com/spec.ccfc.min"
          curl -fsSL "${release_url}/firecracker-ci/v1.10/x86_64/vmlinux-6.1.102" -o vmlinux.bin
          curl -fsSL "${release_url}/firecracker-ci/v1.10/x86_64/ubuntu-22.04.ext4" -o rootfs.ext4
          curl -fsSL "${release_url}/firecracker-ci/v1.10/x86_64/ubuntu-22.04.id_rsa" -o id_rsa
          chmod 600 id_rsa
          ls -la vmlinux.bin rootfs.ext4 id_rsa

          # The quickstart CI rootfs is only 300MB -- sized for the minimal SSH-probe use case
          # section 8.6 proved isolation with. Installing docker.io (pulls in containerd/runc/
          # iptables) plus terraform plus this package's Python deps genuinely does not fit, on
          # root OR on a redirected scratch disk (dpkg/apt still unpack the installed program
          # files themselves onto root, not just their download cache). Two unsafe/incomplete
          # fixes were tried and rejected first: growing the image in place (truncate + e2fsck +
          # resize2fs) corrupted the guest filesystem (dpkg's own status file vanished mid-
          # install); a separate scratch disk only redirects the download cache, not where
          # installed files actually land. The safe fix: mount the original small image AND a
          # freshly made bigger one as loopback devices on the HOST, and plain `cp -a` everything
          # across -- an ordinary file copy, not a live-filesystem resize, so there is no
          # corruption risk. The bigger image then becomes the root drive outright.
          mkdir -p /tmp/src_root /tmp/big_root
          sudo mount -o loop rootfs.ext4 /tmp/src_root
          dd if=/dev/zero of=bigroot.ext4 bs=1M count=10240 status=none
          mkfs.ext4 -q bigroot.ext4
          sudo mount -o loop bigroot.ext4 /tmp/big_root
          sudo cp -a /tmp/src_root/. /tmp/big_root/
          sudo umount /tmp/src_root /tmp/big_root
          ls -la rootfs.ext4 bigroot.ext4

      - name: Prepare host-side fixtures for the wired pipeline (smoke + hostile-escape)
        run: |
          set -euxo pipefail
          mkdir -p /tmp/g9_wired/smoke /tmp/g9_wired/hostile

          cat > /tmp/g9_wired/smoke/main.tf <<'SMOKETF'
          terraform {
            required_providers { aws = { source = "hashicorp/aws", version = ">= 5.0" } }
          }
          resource "aws_s3_bucket" "smoke" {
            bucket = "g9-wired-smoke-bucket"
          }
          SMOKETF

          # The hostile fixture: a real, already-allowlisted resource type carrying a
          # local-exec provisioner (section 8.1 -- provisioners attach to ANY resource, not just
          # null_resource, and null_resource itself isn't even on RESOURCE_TYPE_ALLOWLIST, so it
          # would never reach an apply attempt at all -- this fixture must use a type the
          # allowlist actually lets through so the provisioner genuinely executes). The canary
          # target (172.16.0.1:9999) is the proven tap-gateway address from section 8.6's real
          # proof -- the exact address the guest-to-host reachability gap was found and fixed on.
          cat > /tmp/g9_wired/hostile/main.tf <<'HOSTILETF'
          terraform {
            required_providers { aws = { source = "hashicorp/aws", version = ">= 5.0" } }
          }
          resource "aws_s3_bucket" "hostile" {
            bucket = "g9-wired-hostile-bucket"
            provisioner "local-exec" {
              command = "(timeout 5 bash -c 'exec 3<>/dev/tcp/172.16.0.1/9999 && echo probe >&3 && head -1 <&3' || true) > /root/escape_attempt_result.txt 2>&1; cat /root/escape_attempt_result.txt"
            }
          }
          HOSTILETF

          cat > /tmp/g9_wired/run_smoke.py <<'SMOKEPY'
          import sys, json
          sys.path.insert(0, "/root/minusops/core/governance")
          sys.path.insert(0, "/root/minusops/core/reporting")
          import ephemeral_apply as ea
          ea.RESOURCE_TYPE_ALLOWLIST["aws_s3_bucket"] = ea._entry(False, ministack=(True, False))
          result = ea.run_ephemeral_apply("/root/g9_wired/smoke", emulator="ministack",
                                           apply_timeout=180, destroy_timeout=180)
          print(json.dumps(result, indent=2))
          assert result["evaluation_failed"] is False, (
              f"real ephemeral_apply.py did not apply cleanly inside the microVM boundary: {result}")
          assert result["coverage"] == "full"
          assert result["emulator"] == "ministack"
          assert result["aws_resources_applied"] == ["aws_s3_bucket.smoke"]
          print("WIRED_SMOKE_TEST_PASSED_INSIDE_MICROVM")
          SMOKEPY

          cat > /tmp/g9_wired/run_hostile.py <<'HOSTILEPY'
          import sys, json
          sys.path.insert(0, "/root/minusops/core/governance")
          sys.path.insert(0, "/root/minusops/core/reporting")
          import ephemeral_apply as ea
          ea.RESOURCE_TYPE_ALLOWLIST["aws_s3_bucket"] = ea._entry(False, ministack=(True, False))
          # Deliberately NOT asserting evaluation_failed here -- whether Terraform itself calls
          # this apply a "success" is irrelevant to what this fixture proves. The load-bearing
          # check is on the HOST side (did the canary listener ever get reached), done by the
          # workflow step after this one runs, not by this script's own exit code.
          result = ea.run_ephemeral_apply("/root/g9_wired/hostile", emulator="ministack",
                                           apply_timeout=180, destroy_timeout=180)
          print(json.dumps(result, indent=2))
          print("WIRED_HOSTILE_FIXTURE_RAN_INSIDE_MICROVM")
          HOSTILEPY

      - name: Boot the microVM and configure networking (proven sequence, section 8.6)
        run: |
          set -euxo pipefail
          cd "$RUNNER_TEMP/fc"
          API_SOCKET="/tmp/firecracker.socket"
          rm -f "$API_SOCKET"
          sudo "${FC_BIN}" --api-sock "$API_SOCKET" &
          sleep 1
          ls -la "$API_SOCKET"

          sudo ip tuntap add dev tap0 mode tap
          sudo ip addr add 172.16.0.1/30 dev tap0
          sudo ip link set dev tap0 up
          sudo sh -c "echo 1 > /proc/sys/net/ipv4/ip_forward"
          HOST_IFACE=$(ip route | grep default | awk '{print $5}' | head -1)
          sudo iptables -t nat -A POSTROUTING -o "$HOST_IFACE" -j MASQUERADE
          sudo iptables -A FORWARD -i tap0 -o "$HOST_IFACE" -j ACCEPT
          sudo iptables -A FORWARD -i "$HOST_IFACE" -o tap0 -m state --state RELATED,ESTABLISHED -j ACCEPT
          # The section 8.6 fix, baked in from the start this time (not discovered live again):
          # the rules above only govern traffic PASSING THROUGH the host (FORWARD chain); this
          # blocks any NEW guest-initiated connection to the host itself (INPUT chain) while
          # still allowing the host's own outbound SSH-into-guest management traffic to get its
          # return packets.
          sudo iptables -A INPUT -i tap0 -m state --state ESTABLISHED,RELATED -j ACCEPT
          sudo iptables -A INPUT -i tap0 -j DROP

          # Firecracker's own default (never set explicitly until now) is 1 vCPU / 128MiB RAM --
          # nowhere near enough to apt-get install docker.io (containerd/runc/iptables) without
          # the guest silently going unresponsive mid-install (observed directly: SSH itself
          # stopped responding, "Timeout, server ... not responding", partway through apt-get).
          sudo curl -sf -X PUT --unix-socket "$API_SOCKET" \
            --data '{"vcpu_count": 2, "mem_size_mib": 2048}' \
            "http://localhost/machine-config"
          sudo curl -sf -X PUT --unix-socket "$API_SOCKET" \
            --data '{"kernel_image_path":"'"$(pwd)"'/vmlinux.bin","boot_args":"console=ttyS0 reboot=k panic=1 pci=off ip=172.16.0.2::172.16.0.1:255.255.255.252::eth0:off"}' \
            "http://localhost/boot-source"
          sudo curl -sf -X PUT --unix-socket "$API_SOCKET" \
            --data '{"drive_id":"rootfs","path_on_host":"'"$(pwd)"'/bigroot.ext4","is_root_device":true,"is_read_only":false}' \
            "http://localhost/drives/rootfs"
          sudo curl -sf -X PUT --unix-socket "$API_SOCKET" \
            --data '{"iface_id":"net1","guest_mac":"06:00:AC:10:00:02","host_dev_name":"tap0"}' \
            "http://localhost/network-interfaces/net1"
          sudo curl -sf -X PUT --unix-socket "$API_SOCKET" \
            --data '{"action_type":"InstanceStart"}' \
            "http://localhost/actions"

          for i in $(seq 1 20); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=2 -o BatchMode=yes -i id_rsa root@172.16.0.2 "echo GUEST_ALIVE" 2>/dev/null; then
              break
            fi
            echo "waiting for guest ssh... ($i)"
            sleep 2
          done
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=5 -o ServerAliveCountMax=3 -i id_rsa root@172.16.0.2 "hostname; uname -a; df -h /"

      - name: Configure DNS inside the guest (NAT alone routes IPs, not names)
        run: |
          set -euxo pipefail
          cd "$RUNNER_TEMP/fc"
          # The guest can already reach the internet by IP (MASQUERADE + FORWARD ACCEPT), but has
          # no DNS resolver configured -- apt-get's hostname lookups (archive.ubuntu.com) fail
          # with "Temporary failure resolving" until this is set. rm -f first: the base image may
          # ship /etc/resolv.conf as a symlink into systemd-resolved, which a plain redirect
          # would follow and fail to overwrite as expected.
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=5 -o ServerAliveCountMax=3 -i id_rsa root@172.16.0.2 "rm -f /etc/resolv.conf && echo 'nameserver 8.8.8.8' > /etc/resolv.conf && cat /etc/resolv.conf"

      - name: Initialize dpkg's status database (genuinely absent on this minimal quickstart image)
        run: |
          set -euxo pipefail
          cd "$RUNNER_TEMP/fc"
          # Confirmed directly, not assumed: "E: flAbsPath on /var/lib/dpkg/status failed --
          # No such file or directory" fires instantly, before any real apt-get work runs (ruled
          # out disk space as the cause once the rootfs was already 6GB) -- this quickstart image
          # is a bare kernel-boot+SSH probe artifact, never fully provisioned with a dpkg
          # database at all. An empty-but-well-formed status file (zero packages known) is a
          # valid starting state and is what dpkg/apt expect to find, not a workaround.
          SSH="ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=5 -o ServerAliveCountMax=3 -i id_rsa root@172.16.0.2"
          $SSH "mkdir -p /var/lib/dpkg/info /var/lib/dpkg/updates /var/lib/dpkg/triggers && touch /var/lib/dpkg/status /var/lib/dpkg/available && ls -la /var/lib/dpkg/status"

      - name: Provision the guest -- docker, terraform, python, this package (all INSIDE the VM)
        run: |
          set -euxo pipefail
          cd "$RUNNER_TEMP/fc"
          SSH="ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=5 -o ServerAliveCountMax=3 -i id_rsa root@172.16.0.2"
          # Every remote command below is wrapped in `timeout` -- an earlier iteration of this
          # job hung silently for 55 minutes on a stalled apt-get before finally erroring, wasting
          # the whole debugging cycle on one dead command. A bounded failure is diagnosable; a
          # silent one is not.
          # Real progress this time: 2000+ files unpacked, then dpkg stopped dead on an
          # interactive conffile prompt (/etc/security/namespace.init, shipped by both the base
          # image and the incoming libpam-modules package) -- DEBIAN_FRONTEND=noninteractive
          # silences apt's OWN prompts but does not stop dpkg's separate conffile-conflict
          # prompt; that needs its own explicit flags.
          $SSH "timeout 300 bash -c 'apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y -qq -o Dpkg::Options::=--force-confdef -o Dpkg::Options::=--force-confold docker.io python3-pip python3-venv unzip' >/tmp/apt.log 2>&1 || (cat /tmp/apt.log; exit 1)"
          $SSH "apt-get clean"
          # Real cause, found via the journalctl dump above, not guessed: this minimal
          # quickstart kernel has no nf_tables support, so iptables' default nft backend fails
          # ("Failed to initialize nft: Protocol not supported"), and Docker's bridge driver
          # needs iptables to create its NAT chain. Switch to the legacy xtables backend, which
          # this kernel's older netfilter modules do support.
          $SSH "update-alternatives --set iptables /usr/sbin/iptables-legacy || true; update-alternatives --set ip6tables /usr/sbin/ip6tables-legacy || true"
          $SSH "timeout 30 systemctl enable --now docker || (journalctl -xeu docker.service --no-pager | tail -100; dockerd --version; exit 1)"
          for i in $(seq 1 15); do
            if $SSH "timeout 10 docker info >/dev/null 2>&1"; then break; fi
            echo "waiting for dockerd inside guest... ($i)"; sleep 2
          done
          $SSH "timeout 60 curl -fsSL https://releases.hashicorp.com/terraform/1.10.5/terraform_1.10.5_linux_amd64.zip -o /tmp/tf.zip && unzip -o /tmp/tf.zip -d /usr/local/bin && terraform version"
          # Diagnostic, not a fix -- the 6GB root has run out of space at this point before,
          # need real numbers rather than another guess: what's actually consuming it.
          $SSH "df -h /; du -sh /var/lib/docker /var/cache/apt/archives /usr 2>/dev/null | sort -rh"

      - name: Copy the repo + wired fixtures into the guest
        run: |
          set -euxo pipefail
          cd "$RUNNER_TEMP/fc"
          SSH_OPTS="-o StrictHostKeyChecking=no -o ServerAliveInterval=5 -o ServerAliveCountMax=3 -i id_rsa"
          ssh $SSH_OPTS root@172.16.0.2 "mkdir -p /root/minusops /root/g9_wired"
          tar -C "$GITHUB_WORKSPACE" -cf - --exclude=.git . | ssh $SSH_OPTS root@172.16.0.2 "tar -C /root/minusops -xf -"
          tar -C /tmp/g9_wired -cf - . | ssh $SSH_OPTS root@172.16.0.2 "tar -C /root/g9_wired -xf -"
          ssh $SSH_OPTS root@172.16.0.2 "cd /root/minusops && timeout 300 pip3 install -q '.[dev]'"

      - name: Start MiniStack inside the guest (its docker.sock never leaves the VM)
        run: |
          set -euxo pipefail
          cd "$RUNNER_TEMP/fc"
          SSH="ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=5 -o ServerAliveCountMax=3 -i id_rsa root@172.16.0.2"
          # Real cause, found live: Docker's bridge-networking path additionally needs the
          # iptables `raw` table (a newer per-container "direct access filtering" isolation
          # rule) -- this minimal kernel doesn't have that netfilter module at all ("Table does
          # not exist"), and it's a monolithic CI kernel with no loadable-module support to add
          # it. This guest exists to run exactly one container with no other tenants to isolate
          # from, so the bridge/NAT path isn't needed at all -- --network host binds the
          # container straight to the guest's own network namespace, sidestepping Docker's
          # iptables-managed bridge entirely. No -p mapping needed or allowed in this mode: the
          # container's own bound port 4566 IS the guest's port 4566 directly.
          $SSH "timeout 120 docker run -d --name ministack --network host ministackorg/ministack"
          for i in $(seq 1 30); do
            if $SSH "timeout 10 bash -c 'curl -sf http://localhost:4566/_localstack/health >/dev/null 2>&1 || curl -sf http://localhost:4566/ >/dev/null 2>&1'"; then
              echo "ministack responding after $i attempts"; break
            fi
            sleep 1
          done

      - name: Arm the host-side escape canary (BEFORE the hostile fixture runs)
        run: |
          set -euxo pipefail
          rm -f /tmp/host_listener.log
          (python3 -c "
          import socket
          s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
          s.bind(('172.16.0.1', 9999))
          s.settimeout(120)
          s.listen(1)
          try:
              conn, addr = s.accept()
              conn.sendall(b'HOST_REACHED_FROM_GUEST\n')
              conn.close()
          except socket.timeout:
              pass
          " > /tmp/host_listener.log 2>&1 &)
          sleep 1
          echo "host canary listener armed on 172.16.0.1:9999"

      - name: Real ephemeral_apply.py, run for real, INSIDE the microVM boundary
        run: |
          set -euxo pipefail
          cd "$RUNNER_TEMP/fc"
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=5 -o ServerAliveCountMax=3 -i id_rsa root@172.16.0.2 "cd /root/minusops && timeout 500 python3 /root/g9_wired/run_smoke.py"

      - name: Hostile-escape fixture -- same real pipeline, same real boundary
        run: |
          set -uxo pipefail
          cd "$RUNNER_TEMP/fc"
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=5 -o ServerAliveCountMax=3 -i id_rsa root@172.16.0.2 "cd /root/minusops && timeout 500 python3 /root/g9_wired/run_hostile.py"
          echo "hostile fixture run complete -- checking the HOST side next, not this exit code"

      - name: THE LOAD-BEARING CHECK -- did the canary ever reach the host?
        run: |
          set -euxo pipefail
          sleep 2
          echo "=== host listener log ==="
          cat /tmp/host_listener.log || true
          if grep -q "HOST_REACHED_FROM_GUEST" /tmp/host_listener.log 2>/dev/null; then
            echo "::error::ISOLATION BOUNDARY FAILED -- the hostile local-exec provisioner reached the host from inside the wired ephemeral_apply.py pipeline. G9 must not be considered closed."
            exit 1
          fi
          echo "Isolation boundary held: the hostile local-exec provisioner, run through the real ephemeral_apply.py pipeline inside the microVM, never reached the host."

      - name: Teardown the microVM unconditionally
        if: always()
        run: |
          sudo pkill -f "firecracker --api-sock" || true
          sudo ip link delete tap0 || true
          echo "microVM torn down"
