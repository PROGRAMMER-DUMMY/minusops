name: KVM Probe (scratch, temporary)

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Check /dev/kvm and virtualization support
        run: |
          echo "=== /dev/kvm ==="
          ls -la /dev/kvm 2>&1 || echo "NO /dev/kvm"
          echo "=== kvm-ok ==="
          sudo apt-get update -qq && sudo apt-get install -y -qq cpu-checker >/dev/null 2>&1
          kvm-ok 2>&1 || echo "kvm-ok not conclusive"
          echo "=== /proc/cpuinfo virtualization flags ==="
          grep -E 'vmx|svm' /proc/cpuinfo | head -1 || echo "no vmx/svm flags"
          echo "=== systemd-detect-virt ==="
          systemd-detect-virt 2>&1 || true
          echo "=== can we actually create a KVM-backed VM? (firecracker check) ==="
          if [ -e /dev/kvm ]; then
            echo "/dev/kvm exists, checking permissions"
            stat /dev/kvm
          fi
