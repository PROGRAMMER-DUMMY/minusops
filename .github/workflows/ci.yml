name: CI

# Proves the engine cross-platform: installs the package and runs the full suite
# (including the real-terraform gate e2e) on Linux, macOS, and Windows.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: "test ${{ matrix.os }} / py${{ matrix.python }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"
          terraform_wrapper: false   # the e2e test invokes the real terraform binary

      - name: Cache Terraform provider plugins
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/tf-plugin-cache
          key: tf-plugin-cache-${{ runner.os }}-${{ hashFiles('core/generation/synthesizer.py') }}
          restore-keys: |
            tf-plugin-cache-${{ runner.os }}-

      - name: Ensure plugin cache dir exists
        env:
          TF_PLUGIN_CACHE_DIR: ${{ runner.temp }}/tf-plugin-cache
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"
        shell: bash

      - name: Install package (validates packaging + console scripts)
        run: python -m pip install ".[dev]"

      - name: Console scripts are installed
        run: minusctl --help

      # G6 (docs/g6_scope.md, Phase 3) evaluates its Rego rules by shelling out to a real `opa`
      # binary -- without it on PATH, rego_gate.evaluate() fails closed (opa_not_found) and
      # tests/test_rego_gate.py's 34 tests silently SKIP rather than run, which is the exact
      # "gate that's inert where it ships" pattern this session's other fixes exist to close.
      # Pinned + checksum-verified the same way the Dockerfile's Terraform download is: OPA
      # publishes a per-binary `.sha256` file (verified live against the real release, not
      # assumed) in the same `<hash>  <filename>` format `sha256sum -c` expects. Fails loud on
      # a checksum mismatch or a missing asset -- no silently-absent gate, same discipline as
      # the checksum-that-never-verified lesson from the Docker fix.
      - name: Install OPA (pinned, checksum-verified)
        shell: bash
        env:
          OPA_VERSION: "1.18.2"
        run: |
          set -euxo pipefail
          arch="$(uname -m)"
          case "$(uname -s)" in
            Linux)
              case "$arch" in
                x86_64) asset="opa_linux_amd64" ;;
                aarch64|arm64) asset="opa_linux_arm64" ;;
                *) echo "unsupported Linux arch: $arch"; exit 1 ;;
              esac
              bin_name="opa" ;;
            Darwin)
              case "$arch" in
                x86_64) asset="opa_darwin_amd64" ;;
                arm64) asset="opa_darwin_arm64" ;;
                *) echo "unsupported macOS arch: $arch"; exit 1 ;;
              esac
              bin_name="opa" ;;
            MINGW*|MSYS*|CYGWIN*)
              asset="opa_windows_amd64.exe"
              bin_name="opa.exe" ;;
            *) echo "unsupported OS: $(uname -s)"; exit 1 ;;
          esac
          base_url="https://github.com/open-policy-agent/opa/releases/download/v${OPA_VERSION}"
          curl --retry 5 --retry-delay 2 --retry-all-errors -fsSLo "/tmp/${asset}" "${base_url}/${asset}"
          curl --retry 5 --retry-delay 2 --retry-all-errors -fsSLo "/tmp/${asset}.sha256" "${base_url}/${asset}.sha256"
          (cd /tmp && sha256sum -c "${asset}.sha256")
          mkdir -p "$HOME/.local/bin"
          cp "/tmp/${asset}" "$HOME/.local/bin/${bin_name}"
          chmod +x "$HOME/.local/bin/${bin_name}"
          rm -f "/tmp/${asset}" "/tmp/${asset}.sha256"
          # Real bug caught by the first CI run of this step, not assumed away: on the Windows
          # runner, git-bash's own PATH lookup (`opa version` inside THIS step) resolves the
          # POSIX-style path fine, but a plain `/c/Users/...` path written to $GITHUB_PATH does
          # not translate to a form native Windows child processes (python.exe spawned by a
          # later bash step) can resolve -- toolpath.find_tool's shutil.which() came back empty
          # even though the file was genuinely there. Fixed by writing the Windows-native form
          # (via `cygpath -w`, only present in git-bash on Windows runners) to $GITHUB_PATH
          # instead of the raw MSYS path.
          if command -v cygpath >/dev/null 2>&1; then
            cygpath -w "$HOME/.local/bin" >> "$GITHUB_PATH"
          else
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      # Proves item 4 of docs/g6_scope.md's proof bar the same way the Terraform checksum fix
      # was proven: not "the step didn't error", but a real assertion that opa is actually
      # invocable and rego_gate.evaluate() returns a genuine verdict, not opa_not_found.
      - name: OPA is present and G6 returns a real verdict, not opa_not_found
        shell: bash
        run: |
          set -euxo pipefail
          opa version
          python - <<'PY'
          import sys
          sys.path.insert(0, "core/governance")
          sys.path.insert(0, "core/reporting")
          import rego_gate
          plan = {"resource_changes": [
              {"address": "aws_s3_bucket.b", "mode": "managed", "type": "aws_s3_bucket",
               "change": {"actions": ["create"], "after": {}, "after_unknown": {}}},
          ], "configuration": {"root_module": {"resources": []}}}
          result = rego_gate.evaluate(plan)
          assert result["evaluation_failed"] is False, f"G6 did not run: {result}"
          ids = [f["id"] for f in result["findings"]]
          assert "SEC-01" in ids and "COST-01" in ids, f"expected SEC-01/COST-01 on an unprotected bucket, got: {result}"
          print("OPA/G6 verdict:", result)
          PY

      - name: Run test suite
        # runner.temp is only resolvable in step-level env (job-level env errored: "Unrecognized
        # named-value: 'runner'" -- confirmed directly against the real GitHub Actions
        # validator), so this is set per-step rather than once at the job level, matching
        # schema-watch.yml's own already-working pattern.
        env:
          TF_PLUGIN_CACHE_DIR: ${{ runner.temp }}/tf-plugin-cache
        run: python -m pytest -q

      - name: No-cloud demo end to end (generation + report + audit chain)
        env:
          TF_PLUGIN_CACHE_DIR: ${{ runner.temp }}/tf-plugin-cache
        run: |
          minusctl demo governed-data-pipeline --owner ci --daily-data-gb 10
          minusctl readiness
          minusctl audit verify

  package:
    name: "wheel asset smoke"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # G2 (core/generation/schema_lint.py) gates the `pin` CLI action against the real, live
      # provider schema, no bypass flag -- this job's own "Governance output never lands
      # inside the installed package" step calls `minus-update-module pin`, which now
      # genuinely requires terraform on PATH wherever pin runs, this smoke job included. Found
      # by actually running CI, not local dogfooding (which never exercised "pin from a wheel-
      # installed environment with no terraform").
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"
          terraform_wrapper: false

      - name: Build wheel
        run: |
          # --no-isolation uses the ambient environment instead of a fresh build venv (faster,
          # and this job is already isolated at the job/container level) -- but that means the
          # [build-system] requires in pyproject.toml (setuptools>=68, wheel) aren't installed
          # for it automatically the way an isolated build would; a fresh Python 3.12 CI image
          # doesn't necessarily bundle setuptools any more. Install them explicitly rather than
          # dropping --no-isolation, since the isolation itself was never the problem.
          python -m pip install --upgrade pip build setuptools wheel
          python -m build --wheel --no-isolation

      - name: Install wheel outside source checkout
        run: |
          python -m venv /tmp/minusops-wheel
          /tmp/minusops-wheel/bin/python -m pip install dist/*.whl
          mkdir -p /tmp/minusops-smoke
          cd /tmp/minusops-smoke
          /tmp/minusops-wheel/bin/minusctl --help
          /tmp/minusops-wheel/bin/minus-accelerator --help
          /tmp/minusops-wheel/bin/minus-update-module --help
          /tmp/minusops-wheel/bin/minus-schema-watch --help
          /tmp/minusops-wheel/bin/python - <<'PY'
          import os
          from core.generation import modules
          module_path = modules.module_dir("query-athena")
          assert os.path.exists(os.path.join(module_path, "main.tf")), module_path
          assert modules.validate_modules() == []
          print(module_path)
          PY

      - name: Governance output never lands inside the installed package (REPO_ROOT wheel bug)
        run: |
          cd /tmp/minusops-smoke
          /tmp/minusops-wheel/bin/minus-update-module pin --module query-athena --source ci-wheel-smoke
          /tmp/minusops-wheel/bin/python - <<'PY'
          import os
          from core.generation import modules
          root = modules.output_root()
          # A pip-installed wheel's REPO_ROOT is naked dirname math off modules.py's own
          # location (inside the venv's site-packages) -- output_root() must never resolve
          # there, or governance artifacts (recent-changes/, upgrades/, the audit log) would
          # silently write into the Python install instead of a real, findable location.
          assert "minusops-wheel" not in root, f"output_root() resolved inside the installed venv: {root}"
          print("output_root ->", root)
          PY

  docker:
    name: "docker build smoke"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build runner image
        run: docker build -t minusops:ci .

      - name: Smoke test runner image
        run: |
          docker run --rm minusops:ci --help
          docker run --rm --entrypoint minus-accelerator minusops:ci --help
          docker run --rm --entrypoint checkov minusops:ci --version
